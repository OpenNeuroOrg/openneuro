  primaryModality: String
  schemaVersion: String
  secondaryModalities: [String!]
  sessions: [String!]
  size: BigInt!
  subjectMetadata: [SubjectMetadata]
  subjects: [String!]
  tasks: [String!]
  totalFiles: Int!
  validatorMetadata: ValidatorMetadata
}

input SummaryInput {
  dataProcessed: Boolean
  dataTypes: [String!]
  datasetId: ID!
  id: ID!
  modalities: [String!]
  pet: SummaryPetInput
  schemaVersion: String
  secondaryModalities: [String!]
  sessions: [String!]
  size: BigInt!
  subjectMetadata: [SubjectMetadataInput!]
  subjects: [String!]
  tasks: [String!]
  totalFiles: Int!
  validatorMetadata: ValidatorMetadataInput
}

type SummaryPetFields {
  BodyPart: [String!]
  ScannerManufacturer: [String!]
  ScannerManufacturersModelName: [String!]
  TracerName: [String!]
  TracerRadionuclide: [String!]
}

input SummaryPetInput {
  BodyPart: [String!]
  ScannerManufacturer: [String!]
  ScannerManufacturersModelName: [String!]
  TracerName: [String!]
  TracerRadionuclide: [String!]
}

"""
A time string at UTC, such as 10:15:30Z, compliant with the `full-time` format outlined in section 5.6 of the RFC 3339profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar Time

type UpdateContributorsPayload {
  dataset: Dataset
  success: Boolean!
}

input UploadFile {
  filename: String!
  size: BigInt!
}

"""Client metadata needed to complete an upload"""
type UploadMetadata {
  complete: Boolean!
  datasetId: ID!
  endpoint: Int
  estimatedSize: BigInt
  id: ID!
  token: String
}

"""OpenNeuro user records from all providers"""
type User {
  admin: Boolean
  avatar: String
  blocked: Boolean
  created: DateTime!
  email: String
  github: String
  githubSynced: Date
  id: ID
  institution: String
  lastSeen: DateTime
  links: [String!]
  location: String
  modified: DateTime
  name: String
  notifications: [DatasetEvent!]!
  orcid: String
  orcidConsent: Boolean
  provider: UserProvider
}

type UserList {
  totalCount: Int!
  users: [User!]!
}

"""User's notification status"""
type UserNotificationStatus {
  status: NotificationStatusType!
}

"""Which provider a user login comes from"""
enum UserProvider {
  google
  orcid
}

input UserSortInput {
  field: String!
  order: SortOrdering = ascending
}

type ValidationIssue {
  additionalFileCount: Int
  code: Int
  files: [ValidationIssueFile]
  helpUrl: String
  key: String!
  reason: String!
  severity: Severity!
}

type ValidationIssueFile {
  character: Int
  code: Int
  evidence: String
  file: ValidationIssueFileDetail
  helpUrl: String
  key: String!
  line: Int
  name: String
  path: String
  reason: String
  severity: Severity!
}

type ValidationIssueFileDetail {
  name: String
  path: String
  relativePath: String
}

"""Legacy validator count of errors and warnings"""
type ValidationIssueStatus {
  errors: Int
  warnings: Int
}

type ValidatorCodeMessage {
  code: String!
  message: String!
}

input ValidatorCodeMessageInput {
  code: String!
  message: String!
}

input ValidatorInput {
  codeMessages: [ValidatorCodeMessageInput!]!
  datasetId: ID!
  id: ID!
  issues: [ValidatorIssueInput!]!
  validatorMetadata: ValidatorMetadataInput!
}

"""BIDS Validator (schema) issues"""
type ValidatorIssue {
  affects: String
  code: String!
  issueMessage: String
  line: Int
  location: String
  rule: String
  severity: Severity
  subCode: String
}

input ValidatorIssueInput {
  affects: String
  code: String!
  issueMessage: String
  line: Int
  location: String
  rule: String
  severity: Severity
  subCode: String
}

"""BIDS Validator metadata"""
type ValidatorMetadata {
  validator: String
  version: String
}

input ValidatorMetadataInput {
  validator: String
  version: String
}

type WorkerTask {
  args: JSON
  error: String
  executionTime: Int
  finishedAt: DateTime
  id: ID!
  kwargs: JSON
  queuedAt: DateTime
  startedAt: DateTime
  taskName: String
  worker: String
}
