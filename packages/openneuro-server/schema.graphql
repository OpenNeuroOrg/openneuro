"""Analytics for a dataset"""
type Analytic {
  datasetId: ID!
  downloads: Int
  tag: String
  views: Int
}

enum AnalyticTypes {
  downloads
  views
}

type AnnexFsck {
  command: String
  errorMessages: [String!]
  file: String
  key: String
  note: String
  success: Boolean
}

input AnnexFsckInput {
  command: String
  dead: [String!]
  errorMessages: [String!]
  file: String
  input: [String!]
  key: String
  missing: [String!]
  note: String
  success: Boolean
  untrusted: [String!]
}

"""Authors of a dataset"""
type Author {
  ORCID: String
  name: String
}

"""
The `BigInt` scalar type represents non-fractional signed whole numeric values. BigInt can represent values between -(2^53) + 1 and 2^53 - 1. 
"""
scalar BigInt

enum CacheControlScope {
  PRIVATE
  PUBLIC
}

type Comment {
  createDate: DateTime!
  id: ID!
  parent: Comment
  replies: [Comment!]
  text: String!
  user: User
}

"""Defines the Contributor type in contributors.ts"""
type Contributor {
  contributorType: String!
  familyName: String
  givenName: String
  name: String!
  orcid: String
  order: Int
}

input ContributorInput {
  contributorType: String
  familyName: String
  givenName: String
  name: String
  orcid: String
  order: Int
}

type Dataset {
  analytics: Analytic
  brainInitiative: Boolean
  comments: [Comment!]
  created: DateTime!
  derivatives: [DatasetDerivatives!]
  draft: Draft
  events: [DatasetEvent!]
  followers: [Follower!]
  following: Boolean
  history: [DatasetCommit!]
  id: ID!
  latestSnapshot: Snapshot!
  metadata: Metadata
  name: String
  onBrainlife: Boolean
  permissions: DatasetPermissions
  public: Boolean
  publishDate: DateTime
  reviewers: [DatasetReviewer!]
  snapshots: [Snapshot!]
  starred: Boolean
  stars: [Star!]
  uploader: User
  worker: String
}

type DatasetCommit {
  authorEmail: String
  authorName: String
  date: DateTime
  deletions: Int
  files: [DiffFiles]
  filesChanged: Int
  id: ID!
  insertions: Int
  message: String
  references: String
}

type DatasetConnection {
  edges: [DatasetEdge!]
  pageInfo: PageInfo!
}

type DatasetDerivatives {
  dataladUrl: String
  local: Boolean
  name: String
  s3Url: String
}

type DatasetEdge {
  cursor: String!
  id: String!
  node: Dataset!
}

type DatasetEvent {
  datasetId: ID
  event: DatasetEventDescription
  hasBeenRespondedTo: Boolean
  id: ID
  note: String
  notificationStatus: UserNotificationStatus
  responseStatus: ResponseStatusType
  success: Boolean
  timestamp: DateTime
  user: User
}

type DatasetEventDescription {
  contributorData: Contributor
  datasetId: ID
  level: String
  message: String
  public: Boolean
  reason: String
  ref: String
  requestId: ID
  resolutionStatus: ResponseStatusType
  target: User
  targetUserId: ID
  type: String
  version: String
}

"""File metadata and link to contents"""
type DatasetFile {
  annexed: Boolean
  directory: Boolean
  filename: String!
  id: ID!
  size: BigInt
  urls: [String!]
}

input DatasetFilter {
  all: Boolean
  invalid: Boolean
  public: Boolean
  shared: Boolean
  starred: Boolean
}

type DatasetId {
  datasetId: ID
}

type DatasetPermissions {
  id: ID!
  userPermissions: [Permission!]
}

"""Anonymous dataset reviewer"""
type DatasetReviewer {
  datasetId: ID!
  expiration: DateTime
  id: ID!
  url: String!
}

input DatasetSort {
  created: SortOrdering
  downloads: SortOrdering
  name: SortOrdering
  publishDate: SortOrdering
  stars: SortOrdering
  subscriptions: SortOrdering
  uploader: SortOrdering
  views: SortOrdering
}

type DatasetValidation {
  codeMessages: [ValidatorCodeMessage]
  datasetId: String
  errors: Int
  id: String
  issues: [ValidatorIssue]
  warnings: Int
}

"""
A date string, such as 2007-12-03, compliant with the `full-date` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar Date

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

input DeleteFile {
  filename: String
  path: String!
}

"""Set on snapshots that have been deprecated"""
type DeprecatedSnapshot {
  id: ID!
  reason: String
  timestamp: Date
  user: String
}

"""Contents of dataset_description.json"""
type Description {
  Acknowledgements: String
  Authors: [String!]
  BIDSVersion: String!
  DatasetDOI: String
  DatasetType: String
  EthicsApprovals: [String!]
  Funding: [String!]
  HowToAcknowledge: String
  License: String
  Name: String!
  ReferencesAndLinks: [String!]
  SeniorAuthor: String
  id: ID!
}

type DiffFiles {
  binary: Boolean
  mode: Int
  new: String
  old: String
  status: String
}

type Draft {
  contributors: [Contributor!]
  dataset: Dataset
  description: Description
  fileCheck: FileCheck
  files(recursive: Boolean, tree: String): [DatasetFile!]
  head: String
  id: ID
  issues: [ValidationIssue!]
  issuesStatus: ValidationIssueStatus
  modified: DateTime
  readme: String
  size: BigInt
  summary: Summary
  uploads: [UploadMetadata!]
  validation: DatasetValidation
}

type FileCheck {
  annexFsck: [AnnexFsck!]
  datasetId: String!
  hexsha: String!
  refs: [String!]!
  remote: String
}

"""Update to files"""
type FilesUpdate {
  action: String
  datasetId: String
  payload: [DatasetFile]
}

"""An annexed file that has been flagged for removal."""
type FlaggedFile {
  annexKey: String
  createdAt: DateTime
  datasetId: String
  filepath: String
  flagged: Boolean
  flagger: User
  removed: Boolean
  remover: User
  snapshot: String
}

type FollowDatasetResponse {
  following: Boolean
  newFollower: Follower
}

"""Dataset Followers"""
type Follower {
  datasetId: String
  userId: String
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

"""Dataset Metadata"""
type Metadata {
  adminUsers: [String!]
  affirmedConsent: Boolean
  affirmedDefaced: Boolean
  ages: [Float!]
  associatedPaperDOI: String
  dataProcessed: Boolean
  datasetId: ID!
  datasetName: String
  datasetUrl: String
  dxStatus: String
  firstSnapshotCreatedAt: DateTime
  grantFunderName: String
  grantIdentifier: String
  latestSnapshotCreatedAt: DateTime
  modalities: [String!]
  openneuroPaperDOI: String
  seniorAuthor: String
  species: String
  studyDesign: String
  studyDomain: String
  studyLongitudinal: String
  tasksCompleted: [String!]
  trialCount: Int
}

input MetadataInput {
  adminUsers: [String!]
  affirmedConsent: Boolean
  affirmedDefaced: Boolean
  ages: [Float!]
  associatedPaperDOI: String
  dataProcessed: Boolean
  datasetId: ID!
  datasetName: String
  datasetUrl: String
  dxStatus: String
  firstSnapshotCreatedAt: DateTime
  grantFunderName: String
  grantIdentifier: String
  latestSnapshotCreatedAt: DateTime
  modalities: [String!]
  openneuroPaperDOI: String
  seniorAuthor: String
  species: String
  studyDesign: String
  studyDomain: String
  studyLongitudinal: String
  tasksCompleted: [String!]
  trialCount: Int
}

type Mutation {
  addComment(comment: String!, datasetId: ID!, parentId: ID): ID
  addMetadata(datasetId: ID!, metadata: MetadataInput!): Metadata
  cacheClear(datasetId: ID!): Boolean
  createContributorCitationEvent(contributorData: ContributorInput!, datasetId: ID!, targetUserId: ID!): DatasetEvent
  createContributorRequestEvent(datasetId: ID!): DatasetEvent
  createDataset(affirmedConsent: Boolean, affirmedDefaced: Boolean): Dataset
  createGitEvent(commit: String!, datasetId: ID!, reference: String!): DatasetEvent
  createRelation(datasetId: ID!, description: String, doi: String!, kind: RelatedObjectKind!, relation: RelatedObjectRelation!): Dataset
  createReviewer(datasetId: ID!): DatasetReviewer
  createSnapshot(changes: [String!], datasetId: ID!, tag: String!): Snapshot
  deleteComment(commentId: ID!, deleteChildren: Boolean): [String!]
  deleteDataset(id: ID!, reason: String, redirect: String): Boolean
  deleteFiles(datasetId: ID!, files: [DeleteFile!]): Boolean
  deleteRelation(datasetId: ID!, doi: String!): Dataset
  deleteReviewer(datasetId: ID!, id: ID!): DatasetReviewer
  deleteSnapshot(datasetId: ID!, tag: String!): Boolean!
  deprecateSnapshot(datasetId: ID!, reason: String!, tag: String!): Snapshot
  editComment(comment: String!, commentId: ID!): Boolean
  finishImportRemoteDataset(id: ID!, message: String, success: Boolean!): Boolean
  finishUpload(uploadId: ID!): Boolean
  flagAnnexObject(annexKey: String!, datasetId: ID!, filepath: String!, snapshot: String!): Boolean
  followDataset(datasetId: ID!): FollowDatasetResponse
  fsckDataset(datasetId: ID!): Boolean
  importRemoteDataset(datasetId: ID!, url: String!): ID
  prepareRepoAccess(datasetId: ID!): RepoMetadata
  prepareUpload(datasetId: ID!, uploadId: ID!): UploadMetadata
  processContributorCitation(eventId: ID!, status: ResponseStatusType!): DatasetEvent
  processContributorRequest(datasetId: ID!, reason: String, requestId: ID!, resolutionStatus: ResponseStatusType!, targetUserId: ID!): DatasetEvent
  publishDataset(datasetId: ID!): Boolean
  reexportRemotes(datasetId: ID!): Boolean
  removeAnnexObject(annexKey: String!, datasetId: ID!, filename: String, path: String, snapshot: String!): Boolean
  removePermissions(datasetId: ID!, userId: String!): Boolean
  removeUser(id: ID!): Boolean
  resetDraft(datasetId: ID!, ref: String!): Boolean
  revalidate(datasetId: ID!, ref: String!): Boolean
  saveAdminNote(datasetId: ID!, id: ID, note: String!): DatasetEvent
  setAdmin(admin: Boolean!, id: ID!): User
  setBlocked(blocked: Boolean!, id: ID!): User
  starDataset(datasetId: ID!): StarDatasetResponse
  subscribeToNewsletter(email: String!): Boolean
  trackAnalytics(datasetId: ID!, tag: String, type: AnalyticTypes): Boolean
  undoDeprecateSnapshot(datasetId: ID!, tag: String!): Snapshot
  updateContributors(datasetId: String!, newContributors: [ContributorInput!]!): UpdateContributorsPayload!
  updateDescription(datasetId: ID!, field: String!, value: String!): Description
  updateDescriptionList(datasetId: ID!, field: String!, value: [String!]!): Description
  updateEventStatus(eventId: ID!, status: NotificationStatusType!): UserNotificationStatus
  updateFileCheck(annexFsck: [AnnexFsckInput!]!, datasetId: ID!, hexsha: String!, refs: [String!]!, remote: String): FileCheck
  updateOrcidPermissions(datasetId: ID!, level: String!, userOrcid: String!): DatasetPermissions
  updatePermissions(datasetId: ID!, level: String!, userEmail: String!): DatasetPermissions
  updatePublic(datasetId: ID!, publicFlag: Boolean!): Boolean!
  updateReadme(datasetId: ID!, value: String!): Boolean
  updateSummary(summary: SummaryInput!): Summary
  updateUser(id: ID!, institution: String, links: [String!], location: String, orcidConsent: Boolean): User
  updateValidation(validation: ValidatorInput!): Boolean
  updateWorkerTask(args: JSON, error: String, executionTime: Int, finishedAt: DateTime, id: ID!, kwargs: JSON, queuedAt: DateTime, startedAt: DateTime, taskName: String, worker: String): WorkerTask
}

enum NotificationStatusType {
  ARCHIVED
  SAVED
  UNREAD
}

"""Information for pagination in a connection."""
type PageInfo {
  count: Int
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type Permission {
  datasetId: ID!
  level: String!
  user: User
  userId: String!
}

type Query {
  advancedSearch(after: String, allDatasets: Boolean, datasetStatus: String, datasetType: String, first: Int, query: JSON!, sortBy: JSON): DatasetConnection
  dataset(id: ID!): Dataset
  datasets(after: String, before: String, filterBy: DatasetFilter = {}, first: Int = 25, modality: String, myDatasets: Boolean, orderBy: DatasetSort = {created: ascending}): DatasetConnection
  flaggedFiles(deleted: Boolean = false, flagged: Boolean = true): [FlaggedFile!]
  orcidConsent: Boolean
  participantCount(modality: String): Int
  publicMetadata: [Metadata!]
  search(after: String, first: Int, q: String!): DatasetConnection
  snapshot(datasetId: ID!, tag: String!): Snapshot
  user(id: ID!): User
  users(isAdmin: Boolean, isBlocked: Boolean, limit: Int, offset: Int, orderBy: [UserSortInput!], search: String): UserList!
}

"""DOI for an external object"""
type RelatedObject {
  description: String
  id: ID!
  kind: RelatedObjectKind!
  relation: RelatedObjectRelation!
}

"""RelatedObject kind of target object"""
enum RelatedObjectKind {
  Article
  Dataset
}

"""RelatedObject nature of relationship"""
enum RelatedObjectRelation {
  derivative
  sameAs
  source
}

"""Info needed to access git repositories directly"""
type RepoMetadata {
  endpoint: Int
  token: String
}

enum ResponseStatusType {
  ACCEPTED
  DENIED
  PENDING
}

enum Severity {
  error
  warning
}

type Snapshot {
  analytics: Analytic
  contributors: [Contributor!]
  created: DateTime
  dataset: Dataset!
  deprecated: DeprecatedSnapshot
  description: Description
  files(recursive: Boolean, tree: String): [DatasetFile!]
  hexsha: String
  id: ID!
  issues: [ValidationIssue!]
  issuesStatus: ValidationIssueStatus
  onBrainlife: Boolean
  readme: String
  related: [RelatedObject!]
  size: BigInt
  summary: Summary
  tag: String!
  validation: DatasetValidation
}

enum SortOrdering {
  ascending
  descending
}

"""Dataset Stars"""
type Star {
  datasetId: String
  userId: String
}

type StarDatasetResponse {
  newStar: Star
  starred: Boolean
}

type SubjectMetadata {
  age: Float
  group: String
  participantId: String!
  sex: String
}

input SubjectMetadataInput {
  age: Float
  group: String
  participantId: String!
  sex: String
}

